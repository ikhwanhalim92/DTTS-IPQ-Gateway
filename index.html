<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Technician Access</title>

<style>
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#0d47a1;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#fff;
    padding:35px;
    border-radius:15px;
    width:320px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.25);
}

h2{
    margin-bottom:5px;
}

p{
    color:#666;
}

input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    border-radius:8px;
    background:#0d47a1;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1565c0;
}

#error{
    color:red;
    margin-top:15px;
}
</style>

</head>

<body>

<div class="card">

<h2>Technician Access</h2>

<p>Please enter today's pin</p>

<input
type="password"
id="pin"
placeholder="PIN">

<button onclick="checkPin()">
Continue
</button>

<div id="error"></div>

</div>

<script>

const correctPin="AXSModule2026";

const formLink="https://forms.cloud.microsoft/e/QHW6Yrg04j?origin=lprLink";

function checkPin(){

const entered=document.getElementById("pin").value;

if(entered===correctPin){

window.location.href=formLink;

}else{

document.getElementById("error").innerHTML="Incorrect PIN.";

}

}

</script>

</body>
</html>
